<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Results summary component</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <section class="page">
      <div class="card">
        <div class="left">
          <h1 class="title">Your Result</h1>

          <div class="circle">
            <p class="big">76</p>
            <p class="small">of 100</p>
          </div>

          <p class="grade">Great</p>
          <p class="text">
            You scored higher than 65% of the people who have taken these tests.
          </p>
        </div>

        <div class="right">
          <h2 class="subtitle">Summary</h2>

          <ul class="list">
            <li class="row reaction">
              <div class="row-left">
                <img
                  class="icon"
                  src="./assets/images/icon-reaction.svg"
                  alt="img"
                />
                <span class="r-name">Reaction</span>
              </div>
              <p class="row-score">
                <span class="score-strong">80</span>
                <span class="score-low"> / 100</span>
              </p>
            </li>

            <li class="row memory">
              <div class="row-left">
                <img
                  class="icon"
                  src="./assets/images/icon-memory.svg"
                  alt=""
                />
                <span class="m-name">Memory</span>
              </div>
              <p class="row-score">
                <span class="score-strong">92</span>
                <span class="score-low"> / 100</span>
              </p>
            </li>

            <li class="row verbal">
              <div class="row-left">
                <img
                  class="icon"
                  src="./assets/images/icon-verbal.svg"
                  alt=""
                />
                <span class="verbal-name">Verbal</span>
              </div>
              <p class="row-score">
                <span class="score-strong">61</span>
                <span class="score-low"> / 100</span>
              </p>
            </li>

            <li class="row visual">
              <div class="row-left">
                <img
                  class="icon"
                  src="./assets/images/icon-visual.svg"
                  alt=""
                />
                <span class="visual-name">Visual</span>
              </div>
              <p class="row-score">
                <span class="score-strong">72</span>
                <span class="score-low"> / 100</span>
              </p>
            </li>
          </ul>

          <button class="btn" type="button">Continue</button>
        </div>
      </div>
    </section>
  </body>
</html>
